<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 155" width="770" height="155">
  <defs>
    <linearGradient id="blueFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8af8"/>
      <stop offset="40%" stop-color="#2558e8"/>
      <stop offset="100%" stop-color="#1638b8"/>
    </linearGradient>
    <linearGradient id="blueHighlight" x1="0" y1="0" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#7aabff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7aabff" stop-opacity="0"/>
    </linearGradient>
    <filter id="pinShadow" x="-40%" y="-20%" width="180%" height="160%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 3D extrusion CENTRAL -->
  <text x="16" y="116" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#03091e">CENTRAL</text>
  <text x="15" y="115" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#040c28">CENTRAL</text>
  <text x="14" y="114" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#060f36">CENTRAL</text>
  <text x="13" y="113" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#08134a">CENTRAL</text>
  <text x="12" y="112" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#0b1a60">CENTRAL</text>
  <text x="11" y="111" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#0e2278">CENTRAL</text>
  <text x="10" y="110" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="url(#blueFront)">CENTRAL</text>
  <text x="10" y="110" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="url(#blueHighlight)">CENTRAL</text>

  <!-- Pin — más separado de CENTRAL y LED, centrado verticalmente con sobresalto -->
  <g transform="translate(466, 20) scale(1.25)" filter="url(#pinShadow)">
    <path d="M30 0C13.4 0 0 13.4 0 30c0 22 30 50 30 50s30-28 30-50C60 13.4 46.6 0 30 0z" fill="#d8231f"/>
    <path d="M30 0C13.4 0 0 13.4 0 30c0 22 30 50 30 50V0z" fill="#b51a17"/>
    <circle cx="30" cy="29" r="11" fill="#3a0606"/>
    <circle cx="30" cy="29" r="5" fill="#6a1010" opacity="0.6"/>
  </g>

  <!-- 3D extrusion LED -->
  <text x="556" y="116" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#03091e">LED</text>
  <text x="555" y="115" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#040c28">LED</text>
  <text x="554" y="114" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#060f36">LED</text>
  <text x="553" y="113" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#08134a">LED</text>
  <text x="552" y="112" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#0b1a60">LED</text>
  <text x="551" y="111" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="#0e2278">LED</text>
  <text x="550" y="110" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="url(#blueFront)">LED</text>
  <text x="550" y="110" font-family="'Bowlby One', sans-serif" font-size="94" letter-spacing="1" fill="url(#blueHighlight)">LED</text>
</svg>
